<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Pokedex</title>
</head>

<body>

    <h1 class="text-center mt-4 mb-4">Pokedex</h1>

    <div class="container">
        <ol class="list-pokemons row row-cols-2 g-3 list-unstyled justify-content-center">

            <li class="col">
                <div class="bg-success p-3 d-flex flex-column rounded text-white h-100 overflow-hidden">

                    <div class="d-flex flex-column">
                        <span class="number align-self-end opacity-25">#001</span>
                        <span class="name-pokemon fs-4 fw-bold">Bulbasaur</span>
                    </div>

                    <div class="details d-flex justify-content-between align-items-end">
                        <ol class="types list-unstyled mb-0">
                            <li class="type mb-1 border-0 text-center p-2 rounded-pill bg-dark bg-opacity-25"
                                style="font-size: 0.8rem; min-width: 70px;">
                                Grass
                            </li>
                            <li class="type border-0 text-center p-2 rounded-pill bg-dark bg-opacity-25"
                                style="font-size: 0.8rem; min-width: 70px;">
                                Poison
                            </li>
                        </ol>

                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/1.svg"
                            alt="Bulbasaur" class="img-fluid" style="max-height: 80px; width: auto;">
                    </div>
                </div>
            </li>

            <li class="col">
                <div class="bg-success p-3 d-flex flex-column rounded text-white h-100 overflow-hidden">
                    <div class="d-flex flex-column">
                        <span class="number align-self-end opacity-25">#001</span>
                        <span class="name-pokemon fs-4 fw-bold">Bulbasaur</span>
                    </div>
                    <div class="details d-flex justify-content-between align-items-end">
                        <ol class="types list-unstyled mb-0">
                            <li class="type mb-1 border-0 text-center p-2 rounded-pill bg-dark bg-opacity-25"
                                style="font-size: 0.8rem; min-width: 70px;">
                                Grass
                            </li>
                            <li class="type border-0 text-center p-2 rounded-pill bg-dark bg-opacity-25"
                                style="font-size: 0.8rem; min-width: 70px;">
                                Poison
                            </li>
                        </ol>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/1.svg"
                            alt="Bulbasaur" class="img-fluid" style="max-height: 80px; width: auto;">
                    </div>
                </div>
            </li>



        </ol>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
